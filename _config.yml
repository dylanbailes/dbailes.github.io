# Site Settings
title: "Dylan Bailes"
name: "Dylan Bailes"
description: "Mechanical Engineering Student at UC San Diego specializing in Controls, Robotics, and Autonomous Systems."

url: "https://dylanbailes.github.io"
baseurl: ""

# Personal Info
author:
  name: "Dylan Bailes"
  avatar: "/assets/profile.jpg"   # optional (add later)
  bio: "Mechanical Engineering student @ UCSD (GPA: 3.6) with experience in robotics, controls, and UAV systems."
  location: "San Diego, CA"
  email: "dbailes0001@gmail.com"

# Links (IMPORTANT — shows on homepage)
links:
  - label: "Resume"
    url: "/assets/resume.pdf"
  - label: "GitHub"
    url: "https://github.com/dylanbailes"
  - label: "LinkedIn"
    url: "https://linkedin.com/in/YOUR-LINKEDIN"  # replace

# Navigation (keep minimal)
nav:
  - title: "Home"
    url: "/"
  - title: "Projects"
    url: "/projects/"
  - title: "Resume"
    url: "/assets/resume.pdf"

# Theme Settings (Minimal Mistakes style)
remote_theme: "mmistakes/minimal-mistakes"

plugins:
  - jekyll-include-cache
  - jekyll-seo-tag

# Appearance
minimal_mistakes_skin: "default"   # options: default, dark, air, aqua

# Markdown
markdown: kramdown
highlighter: rouge

# Collections (for projects)
collections:
  projects:
    output: true
    permalink: /projects/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "single"
      author_profile: true

# Footer
footer:
  links:
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:dbailes0001@gmail.com"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/dylanbailes"

# SEO (important for professionalism)
social:
  type: Person
  name: Dylan Bailes
  links:
    - https://github.com/dylanbailes
