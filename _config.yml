# Site settings
title: "Dylan Bailes | Robotics & Controls Engineering"
description: "Mechanical Engineering student at UC San Diego specializing in robotics, controls, and autonomous systems. Experience in UAV design, CAD, and system modeling."
url: "https://dylanbailes.github.io"
baseurl: ""   # IMPORTANT: remove /MESGRO for your main site

author: "Dylan Bailes"
email: "dbailes0001@gmail.com"
github_username: "dylanbailes"
linkedin_username: "Dylan Bailes"   # replace

# Professional summary (custom field for homepage use)
summary: "Mechanical Engineering student @ UCSD (GPA 3.6) with experience in UAV systems, robotics, and controls. Skilled in CAD, simulation, and rapid prototyping with a focus on real-world system design and validation."

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
      author_profile: false
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - LICENSE

# Site navigation (clean + recruiter-focused)
navigation:
  - title: "Home"
    url: "/"
  - title: "Projects"
    url: "/projects/"
  - title: "Resume"
    url: "/assets/resume.pdf"

# Project categories (refined to match YOUR work)
project_categories:
  - name: "Robotics"
    slug: "robotics"
    description: "Robotic systems and manipulation"
  - name: "Controls"
    slug: "controls"
    description: "Control systems, state-space models, and estimation"
  - name: "Autonomous Systems"
    slug: "autonomous"
    description: "Autonomous vehicles, perception, and sensor fusion"
  - name: "Mechanical Design"
    slug: "mechanical"
    description: "CAD, prototyping, and structural design"
  - name: "Simulation & Modeling"
    slug: "simulation"
    description: "Physics-based modeling and system validation"

# 3D Model settings (keep — valuable for robotics portfolio)
models:
  supported_formats: ["stl", "obj", "gltf", "glb"]
  default_background: "#f8f9fa"
  camera_controls: true
  auto_rotate: false

# Schematics settings
schematics:
  supported_formats: ["png", "jpg", "jpeg", "svg", "pdf"]
  zoom_enabled: true
  pan_enabled: true

# Resume location (custom convenience field)
resume: "/assets/resume.pdf"
